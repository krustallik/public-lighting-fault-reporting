services:
  db:
    image: postgres:16-alpine
    container_name: lighting-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lighting_faults}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lighting_faults}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: lighting-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lighting_faults}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AUSEMIO_BASE_URL: ${AUSEMIO_BASE_URL:-https://kosice.ausemio.io/public_issues}
      AUSEMIO_API_KEY: ${AUSEMIO_API_KEY:-}
      AUSEMIO_TEST_MODE: ${AUSEMIO_TEST_MODE:-true}
      AUSEMIO_LOCALE: ${AUSEMIO_LOCALE:-sk}
      NOMINATIM_AUTO_GEOCODE: ${NOMINATIM_AUTO_GEOCODE:-false}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-PublicLightingFaultReporting/1.0}
      NOMINATIM_ACCEPT_LANGUAGE: ${NOMINATIM_ACCEPT_LANGUAGE:-sk}
      NOMINATIM_MIN_INTERVAL_MS: ${NOMINATIM_MIN_INTERVAL_MS:-1100}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-in-production}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: lighting-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
      VITE_ADMIN_BASE_PATH: ${VITE_ADMIN_BASE_PATH:-/panel-svietidla}
    depends_on:
      - backend

volumes:
  pgdata:
